<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080"><rect width="1920" height="1080" fill="#0c0c1e"/><text x="960" y="150" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#FFD700">叶家大殿</text><rect x="200" y="250" width="1520" height="500" rx="20" fill="rgba(255,215,0,0.05)" stroke="#FFD700" stroke-width="1"/><text x="960" y="380" text-anchor="middle" font-family="sans-serif" font-size="50" fill="#fff">"叶尘，你灵根已废，</text><text x="960" y="450" text-anchor="middle" font-family="sans-serif" font-size="50" fill="#fff">不配做叶家子弟！"</text><text x="960" y="560" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#888">——叶家大长老</text><text x="960" y="680" text-anchor="middle" font-family="sans-serif" font-size="40" fill="#FF4500">叶尘低头不语，双拳紧握……</text><rect x="0" y="950" width="1920" height="130" fill="rgba(255,215,0,0.1)"/><text x="960" y="1020" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#666">三年前，叶尘灵根被亲叔父夺走</text></svg>

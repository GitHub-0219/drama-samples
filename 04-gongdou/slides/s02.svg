<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080"><rect width="1920" height="1080" fill="#1a0a00"/><text x="960" y="120" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#d4a574">丞相府 · 闺房</text><text x="960" y="300" text-anchor="middle" font-family="sans-serif" font-size="50" fill="#fff">沈清歌猛然睁眼</text><text x="960" y="400" text-anchor="middle" font-family="sans-serif" font-size="50" fill="#fff">发现自己回到了十五岁</text><text x="960" y="520" text-anchor="middle" font-family="sans-serif" font-size="45" fill="#aaa">前世，她被继母和庶妹联手害死</text><text x="960" y="590" text-anchor="middle" font-family="sans-serif" font-size="45" fill="#aaa">一杯毒酒，死不瞑目</text><text x="960" y="720" text-anchor="middle" font-family="sans-serif" font-size="55" fill="#c0392b">她看着铜镜中的自己，冷笑：</text><text x="960" y="810" text-anchor="middle" font-family="sans-serif" font-size="50" fill="#d4a574">"这一世，欠我的，一个都跑不掉。"</text><rect x="0" y="950" width="1920" height="130" fill="rgba(212,165,116,0.1)"/><text x="960" y="1020" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#d4a574">复仇，从今天开始</text></svg>

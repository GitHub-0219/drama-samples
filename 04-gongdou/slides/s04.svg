<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080"><rect width="1920" height="1080" fill="#1a0a00"/><text x="960" y="120" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#d4a574">选秀大殿</text><text x="960" y="300" text-anchor="middle" font-family="sans-serif" font-size="45" fill="#fff">众秀女入殿，沈清歌最后出场</text><text x="960" y="420" text-anchor="middle" font-family="sans-serif" font-size="60" fill="#d4a574">一身素白仙裙，清丽脱俗</text><text x="960" y="520" text-anchor="middle" font-family="sans-serif" font-size="42" fill="#aaa">不是继母准备的那件</text><text x="960" y="640" text-anchor="middle" font-family="sans-serif" font-size="50" fill="#c0392b">皇帝萧衍的目光，第一次停在她身上</text><text x="960" y="740" text-anchor="middle" font-family="sans-serif" font-size="45" fill="#d4a574">"你叫什么名字？"</text><text x="960" y="840" text-anchor="middle" font-family="sans-serif" font-size="48" fill="#fff">"臣女沈清歌。"</text><rect x="0" y="950" width="1920" height="130" fill="rgba(212,165,116,0.1)"/><text x="960" y="1020" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#d4a574">继母的脸色，变了</text></svg>

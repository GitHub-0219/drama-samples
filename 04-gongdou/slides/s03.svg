<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080"><rect width="1920" height="1080" fill="#1a0a00"/><text x="960" y="120" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#d4a574">前厅 · 继母来请安</text><text x="960" y="280" text-anchor="middle" font-family="sans-serif" font-size="45" fill="#fff">继母王氏笑盈盈走来：</text><text x="960" y="380" text-anchor="middle" font-family="sans-serif" font-size="48" fill="#e74c3c">"清歌啊，明日选秀，母亲给你准备了衣裳。"</text><text x="960" y="480" text-anchor="middle" font-family="sans-serif" font-size="40" fill="#aaa">前世，那件衣裳被做了手脚</text><text x="960" y="550" text-anchor="middle" font-family="sans-serif" font-size="40" fill="#aaa">让她在选秀中出丑，从此失宠</text><text x="960" y="680" text-anchor="middle" font-family="sans-serif" font-size="50" fill="#d4a574">沈清歌微笑接过：</text><text x="960" y="770" text-anchor="middle" font-family="sans-serif" font-size="55" fill="#c0392b">"多谢母亲好意。"</text><text x="960" y="850" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#aaa">她已经知道该怎么做了</text><rect x="0" y="950" width="1920" height="130" fill="rgba(212,165,116,0.1)"/><text x="960" y="1020" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#d4a574">这盘棋，她要重新下</text></svg>

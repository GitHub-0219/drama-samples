<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080"><rect width="1920" height="1080" fill="#1a0a00"/><text x="960" y="200" text-anchor="middle" font-family="sans-serif" font-size="50" fill="#d4a574">当晚，沈清歌对着铜镜低语：</text><text x="960" y="380" text-anchor="middle" font-family="sans-serif" font-size="60" fill="#c0392b">"前世你们夺走的一切"</text><text x="960" y="470" text-anchor="middle" font-family="sans-serif" font-size="60" fill="#c0392b">"这一世，我要十倍奉还。"</text><text x="960" y="600" text-anchor="middle" font-family="sans-serif" font-size="42" fill="#aaa">窗外，月光如水</text><text x="960" y="680" text-anchor="middle" font-family="sans-serif" font-size="42" fill="#aaa">她的眼中，是冰冷的火焰</text><text x="960" y="800" text-anchor="middle" font-family="sans-serif" font-size="45" fill="#d4a574">棋局已开，落子无悔</text><rect x="0" y="950" width="1920" height="130" fill="rgba(212,165,116,0.1)"/><text x="960" y="1020" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#d4a574">下集预告：继母的第一个阴谋，被反杀</text></svg>

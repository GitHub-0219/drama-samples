<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080"><rect width="1920" height="1080" fill="#0a0a0a"/><text x="960" y="200" text-anchor="middle" font-family="sans-serif" font-size="55" fill="#fff">林北看着跪在地上的家人</text><text x="960" y="320" text-anchor="middle" font-family="sans-serif" font-size="50" fill="#aaa">淡淡地说：</text><text x="960" y="480" text-anchor="middle" font-family="sans-serif" font-size="65" font-weight="bold" fill="#ff4444">"我回来，不是为了报仇。"</text><text x="960" y="600" text-anchor="middle" font-family="sans-serif" font-size="65" font-weight="bold" fill="#ff4444">"是接我妈，享福。"</text><text x="960" y="750" text-anchor="middle" font-family="sans-serif" font-size="40" fill="#fff">他转身走进老宅，去看五年未见的母亲</text><text x="960" y="830" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#aaa">身后，林家众人冷汗直流</text><rect x="0" y="950" width="1920" height="130" fill="rgba(255,0,0,0.1)"/><text x="960" y="1020" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#ff4444">下集预告：当年欺负母亲的人，一个都跑不掉</text></svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080"><rect width="1920" height="1080" fill="#fff5f5"/><text x="960" y="120" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#ff69b4">陆氏集团 · 大堂</text><text x="960" y="300" text-anchor="middle" font-family="sans-serif" font-size="48" fill="#333">苏念端着咖啡，撞上了一个人</text><text x="960" y="400" text-anchor="middle" font-family="sans-serif" font-size="80">☕💥👔</text><text x="960" y="530" text-anchor="middle" font-family="sans-serif" font-size="48" fill="#333">咖啡洒了他一身</text><text x="960" y="630" text-anchor="middle" font-family="sans-serif" font-size="42" fill="#c71585">"对、对不起！我赔你干洗费！"</text><text x="960" y="730" text-anchor="middle" font-family="sans-serif" font-size="42" fill="#333">男人低头看了看八十万的定制西装</text><text x="960" y="810" text-anchor="middle" font-family="sans-serif" font-size="48" fill="#ff1493">"赔？你赔得起吗？"</text><rect x="0" y="950" width="1920" height="130" fill="rgba(255,105,180,0.1)"/><text x="960" y="1020" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#999">她不知道，眼前这位是陆氏总裁陆景深</text></svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080"><rect width="1920" height="1080" fill="#fff5f5"/><text x="960" y="120" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#ff69b4">下班后 · 公司楼下</text><text x="960" y="300" text-anchor="middle" font-family="sans-serif" font-size="45" fill="#333">苏念加班到深夜，走出公司</text><text x="960" y="400" text-anchor="middle" font-family="sans-serif" font-size="45" fill="#333">一辆黑色迈巴赫停在门口</text><text x="960" y="520" text-anchor="middle" font-family="sans-serif" font-size="50" fill="#333">车窗降下：</text><text x="960" y="630" text-anchor="middle" font-family="sans-serif" font-size="55" fill="#c71585">"上车，我送你。"</text><text x="960" y="730" text-anchor="middle" font-family="sans-serif" font-size="42" fill="#333">"不、不用了陆总，我坐地铁就行"</text><text x="960" y="840" text-anchor="middle" font-family="sans-serif" font-size="48" fill="#ff1493">"这是命令。"</text><rect x="0" y="950" width="1920" height="130" fill="rgba(255,105,180,0.1)"/><text x="960" y="1020" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#999">迈巴赫里，气氛暧昧得让人心跳加速</text></svg>

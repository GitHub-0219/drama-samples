<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080"><rect width="1920" height="1080" fill="#fff0f5"/><text x="960" y="200" text-anchor="middle" font-family="sans-serif" font-size="50" fill="#333">车上，陆景深突然说：</text><text x="960" y="380" text-anchor="middle" font-family="sans-serif" font-size="60" fill="#c71585">"苏念，你知道为什么</text><text x="960" y="460" text-anchor="middle" font-family="sans-serif" font-size="60" fill="#c71585">我不开除你吗？"</text><text x="960" y="580" text-anchor="middle" font-family="sans-serif" font-size="45" fill="#333">"为……为什么？"</text><text x="960" y="720" text-anchor="middle" font-family="sans-serif" font-size="65" font-weight="bold" fill="#ff1493">"因为，你让我想保护一个人。"</text><text x="960" y="840" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#999">苏念的心跳，漏了一拍</text><rect x="0" y="950" width="1920" height="130" fill="rgba(255,105,180,0.1)"/><text x="960" y="1020" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#ff69b4">下集预告：全公司都在传，苏念是总裁的女人</text></svg>

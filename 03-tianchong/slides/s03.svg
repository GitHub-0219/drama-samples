<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080"><rect width="1920" height="1080" fill="#fff0f5"/><text x="960" y="120" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#ff69b4">总裁办公室</text><text x="960" y="300" text-anchor="middle" font-family="sans-serif" font-size="48" fill="#333">陆景深看着她的工牌：</text><text x="960" y="420" text-anchor="middle" font-family="sans-serif" font-size="60" fill="#c71585">"苏念……实习第一天？"</text><text x="960" y="540" text-anchor="middle" font-family="sans-serif" font-size="42" fill="#333">"是的陆总，求你别开除我！"</text><text x="960" y="640" text-anchor="middle" font-family="sans-serif" font-size="42" fill="#333">苏念急得快哭了</text><text x="960" y="760" text-anchor="middle" font-family="sans-serif" font-size="50" fill="#ff1493">陆景深嘴角微扬：</text><text x="960" y="850" text-anchor="middle" font-family="sans-serif" font-size="55" fill="#c71585">"不开除你。但从今天起，你做我的私人助理。"</text><rect x="0" y="950" width="1920" height="130" fill="rgba(255,105,180,0.1)"/><text x="960" y="1020" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#999">全公司都惊了：总裁从不招女助理</text></svg>

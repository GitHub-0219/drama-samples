<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080"><rect width="1920" height="1080" fill="#001a33"/><text x="960" y="120" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#00bfff">放学路上</text><text x="960" y="280" text-anchor="middle" font-family="sans-serif" font-size="45" fill="#fff">前世的死党张伟跑过来：</text><text x="960" y="380" text-anchor="middle" font-family="sans-serif" font-size="48" fill="#fff">"默哥！发什么呆呢？走，打球去！"</text><text x="960" y="500" text-anchor="middle" font-family="sans-serif" font-size="45" fill="#aaa">前世，张伟在他最落魄时借了他五千块</text><text x="960" y="570" text-anchor="middle" font-family="sans-serif" font-size="45" fill="#aaa">那是他唯一没背叛他的兄弟</text><text x="960" y="700" text-anchor="middle" font-family="sans-serif" font-size="50" fill="#00bfff">陈默拍了拍他的肩：</text><text x="960" y="790" text-anchor="middle" font-family="sans-serif" font-size="55" fill="#fff">"伟子，这辈子，换我罩你。"</text><text x="960" y="870" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#aaa">张伟一脸懵："你今天怎么怪怪的？"</text><rect x="0" y="950" width="1920" height="130" fill="rgba(0,191,255,0.1)"/><text x="960" y="1020" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#00bfff">兄弟情，这辈子要好好珍惜</text></svg>

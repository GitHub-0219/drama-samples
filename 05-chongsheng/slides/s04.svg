<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080"><rect width="1920" height="1080" fill="#001a33"/><text x="960" y="120" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#00bfff">回家路上 · 巷子口</text><text x="960" y="280" text-anchor="middle" font-family="sans-serif" font-size="45" fill="#fff">一个身影挡住了他的路</text><text x="960" y="400" text-anchor="middle" font-family="sans-serif" font-size="55" fill="#ff4444">赵天龙——前世的噩梦</text><text x="960" y="500" text-anchor="middle" font-family="sans-serif" font-size="45" fill="#aaa">富二代，抢了他前世的女友</text><text x="960" y="570" text-anchor="middle" font-family="sans-serif" font-size="45" fill="#aaa">还在他母亲病重时嘲笑他</text><text x="960" y="690" text-anchor="middle" font-family="sans-serif" font-size="48" fill="#fff">"哟，穷鬼，挡什么路？滚开！"</text><text x="960" y="810" text-anchor="middle" font-family="sans-serif" font-size="50" fill="#00bfff">陈默没有像前世那样低头</text><text x="960" y="890" text-anchor="middle" font-family="sans-serif" font-size="50" fill="#fff">他平静地抬起眼：</text><rect x="0" y="950" width="1920" height="130" fill="rgba(0,191,255,0.1)"/><text x="960" y="1020" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#ff4444">"赵天龙，你的好日子，到头了。"</text></svg>

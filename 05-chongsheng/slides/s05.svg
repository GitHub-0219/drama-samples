<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080"><rect width="1920" height="1080" fill="#001a33"/><text x="960" y="200" text-anchor="middle" font-family="sans-serif" font-size="50" fill="#fff">赵天龙愣了一下，随即大笑：</text><text x="960" y="350" text-anchor="middle" font-family="sans-serif" font-size="55" fill="#ff4444">"你说什么？你疯了吧？"</text><text x="960" y="500" text-anchor="middle" font-family="sans-serif" font-size="45" fill="#aaa">陈默没有回答</text><text x="960" y="580" text-anchor="middle" font-family="sans-serif" font-size="45" fill="#aaa">他知道，明年赵家会因为一笔投资失败而破产</text><text x="960" y="680" text-anchor="middle" font-family="sans-serif" font-size="50" fill="#00bflen">而那个投资机会，现在只有他知道</text><text x="960" y="800" text-anchor="middle" font-family="sans-serif" font-size="55" fill="#00bfff">"不急，我们慢慢来。"</text><rect x="0" y="950" width="1920" height="130" fill="rgba(0,191,255,0.1)"/><text x="960" y="1020" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#00bfff">下集预告：陈默用重生记忆，赚到第一桶金</text></svg>
